<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>طبشور - منصة تعليمية رقمية</title>

    <!-- Bootstrap -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />

    <!-- icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Tajawal:wght@200;300;400;500;700;800;900&display=swap"
      rel="stylesheet"
    />

    <!-- intl-tel-input -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/intl-tel-input@23.0.10/build/css/intlTelInput.css"
    />

    <!-- style.css -->
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>

  <body>
    <!-- navbar -->
    <div id="navbar"></div>

    <main style="min-height: 100dvh; padding-top: 4rem">
      <div
        class="container pagePadding d-flex flex-column flex-lg-row gap-3 gap-lg-5"
      >
        <!-- profile-sidebar -->
        <div id="profile-sidebar"></div>

        <div class="flex-grow-1">
          <div class="d-flex mb-4">
            <a href="profile.html" class="profile-top-link active"
              >البيانات الشخصية</a
            >
            <a href="change-password.html" class="profile-top-link"
              >تغيير كلمة المرور</a
            >
          </div>

          <form class="d-flex flex-column gap-4">
            <div
              id="uploadBox"
              class="rounded-circle overflow-hidden d-flex flex-column justify-content-center align-items-center gap-2 mx-auto mb-4 position-relative"
              style="
                width: 200px;
                height: 200px;
                cursor: pointer;
                background-color: var(--gray);
                color: var(--p);
                font-size: 12px;
              "
            >
              <i class="bi bi-upload" id="uploadIcon"></i>
              <span id="uploadText">ارفاق صوره جديده</span>

              <!-- الصورة -->
              <img
                id="previewImg"
                src=""
                alt=""
                class="w-100 h-100 object-fit-cover d-none"
              />
            </div>

            <!-- input مخفي -->
            <input type="file" id="fileInput" accept="image/*" hidden />

            <div>
              <label class="form-label">الاسم</label>
              <input
                type="text"
                class="form-control"
                placeholder="اكتب اسمك هنا"
              />
            </div>

            <div>
              <label class="form-label">رقم الجوال</label>
              <input
                id="phone"
                type="tel"
                class="form-control"
                placeholder="أدخل رقم الجوال"
              />
            </div>

            <div>
              <label class="form-label">البريد الإلكتروني</label>
              <input
                type="email"
                class="form-control"
                placeholder="اكتب بريدك هنا"
              />
            </div>

            <button
              type="submit"
              class="main-btn me-auto"
              style="min-width: 200px"
            >
              تعديل البيانات
            </button>
          </form>
        </div>
      </div>
    </main>

    <!-- footer -->
    <div id="footer"></div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- main.js -->
    <script src="assets/js/loadComponent.js"></script>
    <script src="assets/js/main.js"></script>
    <!-- intl-tel-input -->
    <script src="https://cdn.jsdelivr.net/npm/intl-tel-input@23.0.10/build/js/intlTelInput.min.js"></script>

    <script>
      // تفعيل
      const phoneInput = document.querySelector("#phone");
      const iti = window.intlTelInput(phoneInput, {
        initialCountry: "sa", // مصر
        preferredCountries: ["eg", "sa", "ae"],
        separateDialCode: true,
        utilsScript:
          "https://cdn.jsdelivr.net/npm/intl-tel-input@23.0.10/build/js/utils.js",
      });

      // رفع الصوره
      const uploadBox = document.getElementById("uploadBox");
      const fileInput = document.getElementById("fileInput");
      const previewImg = document.getElementById("previewImg");
      const uploadIcon = document.getElementById("uploadIcon");
      const uploadText = document.getElementById("uploadText");

      // لما يضغط على الدائرة
      uploadBox.addEventListener("click", () => {
        fileInput.click();
      });

      // لما يختار صورة
      fileInput.addEventListener("change", (e) => {
        const file = e.target.files[0];

        if (file) {
          const reader = new FileReader();

          reader.onload = function (e) {
            previewImg.src = e.target.result;
            previewImg.classList.remove("d-none");

            // نخفي الأيقونة والنص
            uploadIcon.style.display = "none";
            uploadText.style.display = "none";
          };

          reader.readAsDataURL(file);
        }
      });
    </script>
  </body>
</html>
