<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>طبشور - منصة تعليمية رقمية</title>

    <!-- Bootstrap -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />

    <!-- icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Tajawal:wght@200;300;400;500;700;800;900&display=swap"
      rel="stylesheet"
    />

    <!-- style.css -->
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>

  <body>
    <!-- navbar -->
    <div id="navbar"></div>

    <main style="min-height: 100dvh; padding-top: 4rem">
      <div
        class="container pagePadding d-flex flex-column flex-lg-row gap-3 gap-lg-5"
      >
        <!-- profile-sidebar -->
        <div id="profile-sidebar"></div>

        <div class="flex-grow-1">
          <div
            class="p-4 rounded-4 shadow-sm border-0 mb-4"
            style="background-color: var(--gray)"
          >
            <div class="input-group position-relative">
              <input
                type="text"
                class="form-control border-0 py-2 rounded-3"
                style="padding-inline-start: 2.5rem"
                placeholder="ابحث باسم الكورس"
              />
              <span
                class=""
                style="
                  position: absolute;
                  top: 50%;
                  inset-inline-start: 10px;
                  transform: translateY(-50%);
                  z-index: 5;
                  font-size: 20px;
                "
              >
                <i class="bi bi-search text-muted"></i>
              </span>
            </div>
          </div>

          <section class="row row-cols-1 row-cols-md-2 row-cols-xxl-3 g-4">
            <div class="col">
              <div
                class="course-card h-100 border p-2 shadow-sm rounded-4 d-flex flex-column justify-content-between gap-3"
              >
                <div
                  class="card-img rounded-3 overflow-hidden position-relative"
                >
                  <img src="assets/images/img.png" alt="LMS" />

                  <div
                    class="card-badge position-absolute py-1 px-3 rounded-2 fw-medium text-primary bg-white shadow-sm"
                    style="top: 8px; left: 8px; font-size: 14px; line-height: 1"
                  >
                    Frontend
                  </div>
                </div>

                <h6 class="text-primary">نظام إدارة تعلم احترافي (LMS)</h6>

                <p class="fw-medium" style="font-size: 14px">
                  هل تواجه صعوبة في إدارة التدريب والتعليم داخل مؤسستك وتبحث عن
                  نظام إدارة تعلم احترافي...
                </p>

                <a href="#" class="main-btn text-center fs-6"
                  >تحميل الشهادة <i class="bi bi-download"></i
                ></a>
              </div>
            </div>
          </section>
        </div>
      </div>
    </main>

    <!-- footer -->
    <div id="footer"></div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- main.js -->
    <script src="assets/js/loadComponent.js"></script>
    <script src="assets/js/main.js"></script>
  </body>
</html>
