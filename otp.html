<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>طبشور - منصة تعليمية رقمية</title>

    <!-- Bootstrap -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />

    <!-- icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Tajawal:wght@200;300;400;500;700;800;900&display=swap"
      rel="stylesheet"
    />

    <!-- style.css -->
    <link rel="stylesheet" href="assets/css/style.css" />

    <style>
      .otp-input {
        max-width: 2.8rem;
        max-height: 2.8rem;

        @media (width>=768px) {
          max-width: 3rem;
          max-height: 3rem;
        }
      }
    </style>
  </head>

  <body>
    <!-- navbar -->
    <div id="navbar"></div>

    <main class="container d-flex gap-5">
      <div
        class="overflow-hidden d-none d-lg-flex align-items-center justify-content-center position-sticky top-0"
        style="width: 55%; height: 100dvh; padding-top: 4.9rem"
      >
        <div
          class="login-image d-flex align-items-center justify-content-center"
        >
          <img
            src="assets/images/login-bg.png"
            alt=""
            class="h-100 object-fit-cover mx-auto rounded-5"
            style="width: 450px"
          />

          <div class="flout-img left">
            <img
              src="assets/images/img.png"
              alt=""
              class="w-100 h-100 object-fit-cover"
            />
          </div>

          <div class="flout-img right">
            <img
              src="assets/images/img.png"
              alt=""
              class="w-100 h-100 object-fit-cover"
            />
          </div>
        </div>
      </div>

      <div
        class="flex-grow-1"
        style="min-height: 100dvh; padding: 6rem 1rem 3rem"
      >
        <div
          class="mx-auto h-100 w-100 d-flex flex-column justify-content-center"
        >
          <h3
            class="text-primary text-center mb-5 fw-medium mx-auto"
            style="max-width: 500px; line-height: 2"
          >
            تم ارسال رقم ال OTP الي بريدك الالكتروني يرجي التحقق
          </h3>

          <form class="login-form">
            <div class="d-flex justify-content-center gap-2 gap-md-4 mb-5">
              <input
                class="otp-input form-control rounded-circle text-center"
                maxlength="1"
                inputmode="numeric"
                pattern="[0-9]"
                autocomplete="one-time-code"
              />
              <input
                class="otp-input form-control rounded-circle text-center"
                maxlength="1"
                inputmode="numeric"
                pattern="[0-9]"
              />
              <input
                class="otp-input form-control rounded-circle text-center"
                maxlength="1"
                inputmode="numeric"
                pattern="[0-9]"
              />
              <input
                class="otp-input form-control rounded-circle text-center"
                maxlength="1"
                inputmode="numeric"
                pattern="[0-9]"
              />
              <input
                class="otp-input form-control rounded-circle text-center"
                maxlength="1"
                inputmode="numeric"
                pattern="[0-9]"
              />
              <input
                class="otp-input form-control rounded-circle text-center"
                maxlength="1"
                inputmode="numeric"
                pattern="[0-9]"
              />
            </div>

            <a href="resset-password.html" type="submit" class="main-btn w-100">
              اعادة تعيين كلمة المرور
            </a>
          </form>
        </div>
      </div>
    </main>

    <!-- footer -->
    <div id="footer"></div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- main.js -->
    <script src="assets/js/loadComponent.js"></script>
    <script src="assets/js/main.js"></script>
  </body>
</html>
