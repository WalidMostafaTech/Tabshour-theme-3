<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>طبشور - منصة تعليمية رقمية</title>

    <!-- Bootstrap -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />

    <!-- icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Tajawal:wght@200;300;400;500;700;800;900&display=swap"
      rel="stylesheet"
    />

    <!-- style.css -->
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>

  <body>
    <!-- navbar -->
    <div id="navbar"></div>

    <main style="min-height: 100dvh">
      <div class="container section-header mb-4" style="padding-top: 8rem">
        <div
          class="d-flex align-items-center gap-3"
          style="font-size: 14px; font-weight: 400"
        >
          <span class="opacity-75">الاختبارات</span>
          >
          <span>الاختبارات السابقة</span>
        </div>

        <h2 class="section-header-title">شهادات <span>الطلاب</span></h2>

        <p class="section-header-desc2">
          بدأت رحلتي في عالم البرمجة بشغف كبير، وعملت مع كبرى الشركات التقنية.
          أؤمن بأن التعليم يجب أن يكون عملياً
        </p>
      </div>

      <div class="pagePadding w-100 mx-auto" style="max-width: 800px">
        <section class="d-flex flex-column gap-4">
          <!-- سؤال نصي -->
          <div>
            <label class="mb-2">كيف يعمل الويب؟ (Client vs Server)</label>

            <input
              type="text"
              class="form-control"
              placeholder="اكتب الإجابة هنا"
            />
          </div>

          <!-- سؤال اختياري -->
          <div>
            <label class="mb-2">كيف يعمل الويب؟ (Client vs Server)</label>

            <div class="row g-2">
              <div class="col-md-4">
                <label class="answer-card w-100">
                  <input type="radio" name="q1" />
                  <div class="card-content">إجابة رقم 1</div>
                </label>
              </div>
              <div class="col-md-4">
                <label class="answer-card w-100">
                  <input type="radio" name="q1" />
                  <div class="card-content">إجابة رقم 2</div>
                </label>
              </div>
              <div class="col-md-4">
                <label class="answer-card w-100">
                  <input type="radio" name="q1" />
                  <div class="card-content">إجابة رقم 3</div>
                </label>
              </div>
            </div>
          </div>

          <!-- كرر نفس البلوك لأي عدد أسئلة -->
        </section>

        <button
          class="main-btn mx-auto fs-6 mt-4 d-block"
          style="min-width: 200px"
        >
          حفظ الاجابات
        </button>
      </div>
    </main>

    <!-- footer -->
    <div id="footer"></div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- main.js -->
    <script src="assets/js/loadComponent.js"></script>
    <script src="assets/js/main.js"></script>
  </body>
</html>
