<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>طبشور - منصة تعليمية رقمية</title>

    <!-- Bootstrap -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />

    <!-- icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Tajawal:wght@200;300;400;500;700;800;900&display=swap"
      rel="stylesheet"
    />

    <!-- style.css -->
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>

  <body>
    <!-- navbar -->
    <div id="navbar"></div>

    <main class="container d-flex gap-5">
      <!-- login-images -->
      <div id="login-images" class="d-none d-lg-block" style="width: 50%"></div>

      <div
        class="flex-grow-1"
        style="min-height: 100dvh; padding: 6rem 1rem 3rem"
      >
        <div
          class="mx-auto h-100 w-100 d-flex flex-column justify-content-center"
        >
          <h3
            class="text-primary text-center mb-5 fw-medium mx-auto"
            style="max-width: 500px; line-height: 2"
          >
            اعادة تعيين كلمة المرور
          </h3>

          <form class="login-form">
            <div class="mb-4">
              <label class="form-label">كلمة المرور الجديده</label>
              <div class="position-relative">
                <input
                  type="password"
                  class="form-control ps-5 password-input"
                  placeholder="••••••••"
                />
                <button
                  type="button"
                  onclick="togglePassword(this)"
                  class="password-toggle-btn"
                >
                  <i class="bi bi-eye"></i>
                </button>
              </div>
            </div>

            <div class="mb-4">
              <label class="form-label">تأكيد كلمة المرور الجديدة</label>
              <div class="position-relative">
                <input
                  type="password"
                  class="form-control ps-5 password-input"
                  placeholder="••••••••"
                />
                <button
                  type="button"
                  onclick="togglePassword(this)"
                  class="password-toggle-btn"
                >
                  <i class="bi bi-eye"></i>
                </button>
              </div>
            </div>

            <button type="submit" class="main-btn w-100">
              تأكيد كملة المرور الجديده
            </button>
          </form>
        </div>
      </div>
    </main>

    <!-- footer -->
    <div id="footer"></div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- main.js -->
    <script src="assets/js/loadComponent.js"></script>
    <script src="assets/js/main.js"></script>

    <script>
      function togglePassword(btn) {
        const input = btn.parentElement.querySelector("input");
        const icon = btn.querySelector("i");

        if (input.type === "password") {
          input.type = "text";
          icon.classList.remove("bi-eye");
          icon.classList.add("bi-eye-slash");
        } else {
          input.type = "password";
          icon.classList.remove("bi-eye-slash");
          icon.classList.add("bi-eye");
        }
      }
    </script>
  </body>
</html>
