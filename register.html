<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>طبشور - إنشاء حساب</title>

    <!-- Bootstrap -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />

    <!-- icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Tajawal:wght@200;300;400;500;700;800;900&display=swap"
      rel="stylesheet"
    />

    <!-- intl-tel-input -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/intl-tel-input@23.0.10/build/css/intlTelInput.css"
    />

    <!-- style.css -->
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>

  <body>
    <!-- navbar -->
    <div id="navbar"></div>

    <main class="container d-flex gap-5">
      <div
        class="overflow-hidden d-none d-lg-flex align-items-center justify-content-center position-sticky top-0"
        style="width: 55%; height: 100dvh; padding-top: 4.9rem"
      >
        <div
          class="login-image d-flex align-items-center justify-content-center"
        >
          <img
            src="assets/images/login-bg.png"
            alt=""
            class="h-100 object-fit-cover mx-auto rounded-5"
            style="width: 450px"
          />

          <div class="flout-img left">
            <img
              src="assets/images/img.png"
              alt=""
              class="w-100 h-100 object-fit-cover"
            />
          </div>

          <div class="flout-img right">
            <img
              src="assets/images/img.png"
              alt=""
              class="w-100 h-100 object-fit-cover"
            />
          </div>
        </div>
      </div>

      <div
        class="flex-grow-1"
        style="min-height: 100dvh; padding: 6rem 1rem 3rem"
      >
        <div
          class="mx-auto h-100 w-100 d-flex flex-column justify-content-center"
        >
          <h3 class="text-primary text-center mb-5 fw-medium">انشاء حساب</h3>

          <form class="login-form">
            <div class="mb-4">
              <label class="form-label">الاسم</label>
              <input
                type="text"
                class="form-control"
                placeholder="اكتب اسمك هنا"
              />
            </div>

            <div class="mb-4">
              <label class="form-label">رقم الجوال</label>
              <input
                id="phone"
                type="tel"
                class="form-control"
                placeholder="أدخل رقم الجوال"
              />
            </div>

            <div class="mb-4">
              <label class="form-label">البريد الإلكتروني</label>
              <input
                type="email"
                class="form-control"
                placeholder="اكتب بريدك هنا"
              />
            </div>

            <div class="mb-4">
              <label class="form-label">كلمة المرور</label>
              <div class="position-relative">
                <input
                  type="password"
                  id="password-input"
                  class="form-control ps-5"
                  placeholder="••••••••"
                />
                <button
                  type="button"
                  onclick="togglePassword()"
                  class="password-toggle-btn"
                >
                  <i class="bi bi-eye" id="eye-icon"></i>
                </button>
              </div>
            </div>

            <button type="submit" class="main-btn w-100">انشاء حساب</button>
          </form>
        </div>
      </div>
    </main>

    <!-- footer -->
    <div id="footer"></div>

    <!-- bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- intl-tel-input -->
    <script src="https://cdn.jsdelivr.net/npm/intl-tel-input@23.0.10/build/js/intlTelInput.min.js"></script>
    <!-- main.js  -->
    <script src="assets/js/loadComponent.js"></script>
    <script src="assets/js/main.js"></script>
    <script>
      // تفعيل
      const phoneInput = document.querySelector("#phone");
      const iti = window.intlTelInput(phoneInput, {
        initialCountry: "sa", // مصر
        preferredCountries: ["eg", "sa", "ae"],
        separateDialCode: true,
        utilsScript:
          "https://cdn.jsdelivr.net/npm/intl-tel-input@23.0.10/build/js/utils.js",
      });

      // تغيير نمط كلمة المرور
      function togglePassword() {
        const input = document.getElementById("password-input");
        const icon = document.getElementById("eye-icon");
        if (input.type === "password") {
          input.type = "text";
          icon.className = "bi bi-eye-slash";
        } else {
          input.type = "password";
          icon.className = "bi bi-eye";
        }
      }
    </script>
  </body>
</html>
