<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>طبشور - منصة تعليمية رقمية</title>

    <!-- Bootstrap -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />

    <!-- icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Tajawal:wght@200;300;400;500;700;800;900&display=swap"
      rel="stylesheet"
    />

    <!-- style.css -->
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>

  <body>
    <!-- navbar -->
    <div id="navbar"></div>

    <main class="container d-flex gap-5">
      <!-- login-images -->
      <div id="login-images" class="d-none d-lg-block" style="width: 50%"></div>

      <div
        class="flex-grow-1"
        style="min-height: 100dvh; padding: 6rem 1rem 3rem"
      >
        <div
          class="mx-auto h-100 w-100 d-flex flex-column justify-content-center"
        >
          <h3 class="text-primary text-center mb-5 fw-medium">
            تغيير كلمة المرور
          </h3>

          <form class="login-form">
            <div class="mb-4">
              <label class="form-label">البريد الإلكتروني</label>
              <input
                type="email"
                class="form-control"
                placeholder="اكتب بريدك هنا"
                required
              />
            </div>

            <a href="otp.html" class="main-btn w-100">
              ارسال رابط لتغيير كلمة المرور
            </a>
          </form>
        </div>
      </div>
    </main>

    <!-- footer -->
    <div id="footer"></div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- main.js -->
    <script src="assets/js/loadComponent.js"></script>
    <script src="assets/js/main.js"></script>
  </body>
</html>
